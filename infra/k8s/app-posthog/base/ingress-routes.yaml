apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: posthog-livestream-strip-prefix
  labels:
    app.kubernetes.io/name: posthog-livestream
    app.kubernetes.io/part-of: posthog
spec:
  stripPrefix:
    prefixes:
      - /livestream
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/part-of: posthog
spec:
  entryPoints: [web]
  routes:
    - match: Host(`posthog.nightingale-ai.com`) && PathPrefix(`/i/v0/ai`)
      kind: Rule
      priority: 120
      services:
        - name: posthog-capture-ai
          port: 3000
    - match: Host(`posthog.nightingale-ai.com`) && (PathPrefix(`/i/v1/logs`) || PathPrefix(`/i/v1/traces`) || PathPrefix(`/i/v1/metrics`))
      kind: Rule
      priority: 110
      services:
        - name: posthog-capture-logs
          port: 4318
    - match: Host(`posthog.nightingale-ai.com`) && (PathPrefix(`/e`) || PathPrefix(`/i/v0`) || PathPrefix(`/i/v1/analytics/events`) || PathPrefix(`/batch`) || PathPrefix(`/capture`))
      kind: Rule
      priority: 100
      services:
        - name: posthog-capture
          port: 3000
    - match: Host(`posthog.nightingale-ai.com`) && PathPrefix(`/s`)
      kind: Rule
      priority: 100
      services:
        - name: posthog-replay-capture
          port: 3000
    - match: Host(`posthog.nightingale-ai.com`) && (PathPrefix(`/flags`) || PathPrefix(`/api/feature_flag/local_evaluation`))
      kind: Rule
      priority: 90
      services:
        - name: posthog-feature-flags
          port: 3001
    - match: Host(`posthog.nightingale-ai.com`) && (PathPrefix(`/surveys`) || PathPrefix(`/api/surveys`) || PathPrefix(`/array`))
      kind: Rule
      priority: 90
      services:
        - name: posthog-hypercache
          port: 3002
    - match: Host(`posthog.nightingale-ai.com`) && (PathPrefix(`/public/webhooks`) || PathPrefix(`/public/m`))
      kind: Rule
      priority: 90
      services:
        - name: posthog-plugins
          port: 6738
    - match: Host(`posthog.nightingale-ai.com`) && PathPrefix(`/livestream`)
      kind: Rule
      priority: 90
      middlewares:
        - name: posthog-livestream-strip-prefix
      services:
        - name: posthog-livestream
          port: 8080
    - match: Host(`posthog.nightingale-ai.com`) && PathPrefix(`/posthog`)
      kind: Rule
      priority: 80
      services:
        - name: posthog-seaweedfs
          port: 8333
    - match: Host(`posthog.nightingale-ai.com`)
      kind: Rule
      priority: 10
      services:
        - name: posthog-web
          port: 8000
