apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: posthog-redis
  labels:
    app.kubernetes.io/name: posthog-redis
    app.kubernetes.io/part-of: posthog
spec:
  serviceName: posthog-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-redis
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
        - name: redis
          image: docker.io/redis:7.2-alpine
          args: ["redis-server", "--maxmemory-policy", "allkeys-lru", "--maxmemory", "512mb"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: posthog-redis
  labels:
    app.kubernetes.io/name: posthog-redis
    app.kubernetes.io/part-of: posthog
spec:
  selector:
    app.kubernetes.io/name: posthog-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
