apiVersion: v1
kind: ConfigMap
metadata:
  name: posthog-app-config
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/part-of: posthog
data:
  SITE_URL: "https://posthog.nightingale-ai.com"
  LIVESTREAM_HOST: "https://posthog.nightingale-ai.com/livestream"
  DEPLOYMENT: "hobby"
  OPT_OUT_CAPTURE: "false"
  POSTHOG_SKIP_MIGRATION_CHECKS: "1"
  SKIP_ASYNC_MIGRATIONS_SETUP: "1"
  OTEL_SDK_DISABLED: "true"
  KAFKA_HOSTS: "posthog-redpanda:9092"
  REDIS_URL: "redis://posthog-redis:6379/"
  ISSUE_BUCKETS_REDIS_URL: "redis://posthog-redis:6379/"
  FLAGS_REDIS_ENABLED: "false"
  CDP_REDIS_HOST: "posthog-redis"
  CDP_REDIS_PORT: "6379"
  COOKIELESS_REDIS_HOST: "posthog-redis"
  COOKIELESS_REDIS_PORT: "6379"
  LOGS_REDIS_HOST: "posthog-redis"
  LOGS_REDIS_PORT: "6379"
  LOGS_REDIS_TLS: "false"
  LOGS_REDIS_PASSWORD: ""
  TRACES_REDIS_HOST: "posthog-redis"
  TRACES_REDIS_PORT: "6379"
  TRACES_REDIS_TLS: "false"
  TRACES_REDIS_PASSWORD: ""
  SESSION_RECORDING_API_REDIS_HOST: "posthog-redis"
  SESSION_RECORDING_API_REDIS_PORT: "6379"
  CLICKHOUSE_HOST: "posthog-clickhouse"
  CLICKHOUSE_MIGRATIONS_HOST: "posthog-clickhouse"
  CLICKHOUSE_DATABASE: "posthog"
  CLICKHOUSE_SECURE: "false"
  CLICKHOUSE_VERIFY: "false"
  CLICKHOUSE_CLUSTER: "posthog"
  CLICKHOUSE_WRITABLE_CLUSTER: "posthog_writable"
  CDP_API_URL: "http://posthog-plugins:6738"
  RECORDING_API_URL: "http://posthog-recording-api:6738"
  OBJECT_STORAGE_ENABLED: "true"
  OBJECT_STORAGE_BUCKET: "posthog"
  OBJECT_STORAGE_ENDPOINT: "http://posthog-seaweedfs:8333"
  OBJECT_STORAGE_PUBLIC_ENDPOINT: "https://posthog.nightingale-ai.com"
  OBJECT_STORAGE_REGION: "us-east-1"
  SESSION_RECORDING_V2_S3_BUCKET: "posthog"
  SESSION_RECORDING_V2_S3_ENDPOINT: "http://posthog-seaweedfs:8333"
  SESSION_RECORDING_V2_S3_REGION: "us-east-1"
  PERSONHOG_ADDR: "posthog-personhog-router:50052"
  PERSONHOG_ENABLED: "true"
  PERSONHOG_ROLLOUT_PERCENTAGE: "100"
  BROWSERLESS_CDP_URL: "ws://posthog-browserless:3000"
  HEATMAP_BROWSERLESS_URL: "http://posthog-browserless:3000"
  HEATMAP_BROWSERLESS_BLOCK_CONSENT_MODALS: "false"
  TEMPORAL_HOST: "posthog-temporal"
  TEMPORAL_PORT: "7233"
  TEMPORAL_NAMESPACE: "default"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
