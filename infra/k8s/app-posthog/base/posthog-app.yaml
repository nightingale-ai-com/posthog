apiVersion: v1
kind: Service
metadata:
  name: posthog-web
  labels:
    app.kubernetes.io/name: posthog-web
    app.kubernetes.io/part-of: posthog
spec:
  selector:
    app.kubernetes.io/name: posthog-web
  ports:
    - name: http
      port: 8000
      targetPort: http
    - name: metrics
      port: 8001
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-web
  labels:
    app.kubernetes.io/name: posthog-web
    app.kubernetes.io/part-of: posthog
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-web
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
        - name: web
          image: docker.io/posthog/posthog:latest
          command: ["/bin/bash", "-ec", "./bin/migrate && ./bin/docker-server"]
          envFrom:
            - configMapRef:
                name: posthog-app-config
            - secretRef:
                name: posthog-app-secrets
          ports:
            - name: http
              containerPort: 8000
            - name: metrics
              containerPort: 8001
          readinessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-worker
  labels:
    app.kubernetes.io/name: posthog-worker
    app.kubernetes.io/part-of: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-worker
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
        - name: worker
          image: docker.io/posthog/posthog:latest
          command:
            - /bin/bash
            - -ec
            - |
              trap 'kill $(jobs -p) 2>/dev/null; wait' EXIT
              export PROMETHEUS_MULTIPROC_DIR=/tmp/posthog_celery_prometheus
              source ./bin/celery-queues.env
              ./bin/docker-worker-beat &
              SKIP_ASYNC_MIGRATIONS_SETUP=1 CELERY_WORKER_QUEUES=$CELERY_WORKER_QUEUES celery -A posthog worker -Ofair -n node@%h --without-mingle --without-heartbeat --concurrency=${WEB_CONCURRENCY} &
              wait -n
          env:
            - name: WEB_CONCURRENCY
              value: "2"
          envFrom:
            - configMapRef:
                name: posthog-app-config
            - secretRef:
                name: posthog-app-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
---
