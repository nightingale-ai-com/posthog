apiVersion: v1
kind: Service
metadata:
  name: posthog-feature-flags
  labels:
    app.kubernetes.io/name: posthog-feature-flags
    app.kubernetes.io/part-of: posthog
spec:
  selector:
    app.kubernetes.io/name: posthog-feature-flags
  ports:
    - name: http
      port: 3001
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-feature-flags
  labels:
    app.kubernetes.io/name: posthog-feature-flags
    app.kubernetes.io/part-of: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-feature-flags
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-feature-flags
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
        - name: feature-flags
          image: ghcr.io/posthog/posthog/feature-flags:master
          env:
            - name: ADDRESS
              value: 0.0.0.0:3001
            - name: MAXMIND_DB_PATH
              value: /app/share/GeoLite2-City.mmdb
            - name: RUST_LOG
              value: info
          envFrom:
            - configMapRef:
                name: posthog-app-config
            - secretRef:
                name: posthog-app-secrets
          ports:
            - name: http
              containerPort: 3001
          readinessProbe:
            httpGet:
              path: /_readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: posthog-hypercache
  labels:
    app.kubernetes.io/name: posthog-hypercache
    app.kubernetes.io/part-of: posthog
spec:
  selector:
    app.kubernetes.io/name: posthog-hypercache
  ports:
    - name: http
      port: 3002
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-hypercache
  labels:
    app.kubernetes.io/name: posthog-hypercache
    app.kubernetes.io/part-of: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-hypercache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-hypercache
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
        - name: hypercache
          image: ghcr.io/posthog/posthog/hypercache-server:master
          env:
            - name: ADDRESS
              value: 0.0.0.0:3002
            - name: RUST_LOG
              value: info
          envFrom:
            - configMapRef:
                name: posthog-app-config
          ports:
            - name: http
              containerPort: 3002
          readinessProbe:
            httpGet:
              path: /_readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: posthog-recording-api
  labels:
    app.kubernetes.io/name: posthog-recording-api
    app.kubernetes.io/part-of: posthog
spec:
  selector:
    app.kubernetes.io/name: posthog-recording-api
  ports:
    - name: http
      port: 6738
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-recording-api
  labels:
    app.kubernetes.io/name: posthog-recording-api
    app.kubernetes.io/part-of: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-recording-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-recording-api
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
        - name: recording-api
          image: ghcr.io/posthog/posthog-node:master
          command: ["node", "nodejs/dist/index.js"]
          env:
            - name: PLUGIN_SERVER_MODE
              value: recording-api
          envFrom:
            - configMapRef:
                name: posthog-app-config
            - secretRef:
                name: posthog-app-secrets
          ports:
            - name: http
              containerPort: 6738
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
---
