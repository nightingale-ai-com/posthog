              value: events_plugin_ingestion
            - name: LIVESTREAM_CONSUMERS_EVENT_SECURITY_PROTOCOL
              value: PLAINTEXT
            - name: LIVESTREAM_CONSUMERS_EVENT_GROUP_ID
              value: livestream
            - name: LIVESTREAM_CONSUMERS_SESSION_RECORDING_BROKERS
              value: kafka:9092
            - name: LIVESTREAM_CONSUMERS_SESSION_RECORDING_TOPIC
              value: session_recording_snapshot_item_events
            - name: LIVESTREAM_CONSUMERS_SESSION_RECORDING_SECURITY_PROTOCOL
              value: PLAINTEXT
            - name: LIVESTREAM_CONSUMERS_SESSION_RECORDING_GROUP_ID
              value: livestream-session-recordings
            - name: LIVESTREAM_CONSUMERS_NOTIFICATION_ENABLED
              value: "false"
            - name: LIVESTREAM_REDIS_ADDRESS
              value: posthog-redis
            - name: LIVESTREAM_REDIS_PORT
              value: "6379"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
