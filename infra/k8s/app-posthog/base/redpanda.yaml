apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: posthog-redpanda
  labels:
    app.kubernetes.io/name: posthog-redpanda
    app.kubernetes.io/part-of: posthog
spec:
  serviceName: posthog-redpanda
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-redpanda
        app.kubernetes.io/part-of: posthog
    spec:
      initContainers:
        - name: data-permissions
          image: docker.io/busybox:1.36
          command: ["/bin/sh", "-ec", "chmod -R 0777 /var/lib/redpanda/data"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
          command: ["/usr/bin/rpk"]
          args:
            - redpanda
            - start
            - --kafka-addr
            - internal://0.0.0.0:9092
            - --advertise-kafka-addr
            - internal://posthog-redpanda:9092
            - --pandaproxy-addr
            - internal://0.0.0.0:8082
            - --schema-registry-addr
            - internal://0.0.0.0:8081
            - --rpc-addr
            - 0.0.0.0:33145
            - --advertise-rpc-addr
            - posthog-redpanda:33145
            - --mode
            - dev-container
            - --smp
            - "1"
            - --memory
            - 1G
            - --reserve-memory
            - 0M
            - --overprovisioned
            - --set
            - redpanda.empty_seed_starts_cluster=true
            - --set
            - redpanda.auto_create_topics_enabled=true
          ports:
            - name: kafka
              containerPort: 9092
            - name: schema
              containerPort: 8081
            - name: pandaproxy
              containerPort: 8082
            - name: admin
              containerPort: 9644
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: admin
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: admin
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: posthog-redpanda
  labels:
    app.kubernetes.io/name: posthog-redpanda
    app.kubernetes.io/part-of: posthog
spec:
  selector:
    app.kubernetes.io/name: posthog-redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
    - name: schema
      port: 8081
      targetPort: schema
    - name: pandaproxy
      port: 8082
      targetPort: pandaproxy
    - name: admin
      port: 9644
      targetPort: admin
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app.kubernetes.io/name: posthog-redpanda
    app.kubernetes.io/part-of: posthog
spec:
  selector:
    app.kubernetes.io/name: posthog-redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
---
apiVersion: batch/v1
kind: Job
metadata:
  name: posthog-kafka-init
  labels:
    app.kubernetes.io/name: posthog-kafka-init
    app.kubernetes.io/part-of: posthog
spec:
  backoffLimit: 6
  manualSelector: true
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-kafka-init
      app.kubernetes.io/part-of: posthog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-kafka-init
        app.kubernetes.io/part-of: posthog
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-init
          image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
          command:
            - /bin/sh
            - -ec
            - |
              until rpk topic list --brokers posthog-redpanda:9092 >/dev/null 2>&1; do
                echo "waiting for Redpanda"
                sleep 2
              done
              TOPICS="clickhouse_events_json clickhouse_ai_events_json clickhouse_heatmap_events clickhouse_ingestion_warnings events_plugin_ingestion events_plugin_ingestion_historical events_plugin_ingestion_overflow events_plugin_ingestion_dlq events_plugin_ingestion_async ingestion-clientwarnings-main-1 ingestion-errortracking-main heatmaps_ingestion session_recording_snapshot_item_events logs_ingestion metrics_ingestion traces_ingestion clickhouse_groups clickhouse_person clickhouse_person_distinct_id clickhouse_app_metrics2 log_entries clickhouse_tophog"
              for topic in $TOPICS; do
                rpk topic create "$topic" --brokers posthog-redpanda:9092 -p 1 -r 1 || true
              done
              rpk topic list --brokers posthog-redpanda:9092
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
