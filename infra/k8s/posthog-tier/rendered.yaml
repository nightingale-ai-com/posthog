apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: posthog-browserless
    app.kubernetes.io/part-of: posthog
  name: posthog-browserless
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-browserless
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-browserless
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
      - env:
        - name: TOKEN
          valueFrom:
            secretKeyRef:
              key: BROWSERLESS_TOKEN
              name: posthog-app-secrets
        image: ghcr.io/browserless/chromium:v2.51.2
        name: browserless
        ports:
        - containerPort: 3000
          name: http
        readinessProbe:
          initialDelaySeconds: 10
          periodSeconds: 10
          tcpSocket:
            port: http
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: posthog-capture
    app.kubernetes.io/part-of: posthog
  name: posthog-capture
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-capture
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-capture
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
      - env:
        - name: ADDRESS
          value: 0.0.0.0:3000
        - name: CAPTURE_MODE
          value: events
        - name: KAFKA_TOPIC
          value: events_plugin_ingestion
        - name: CAPTURE_V1_SINKS
          value: msk
        - name: CAPTURE_V1_SINK_MSK_KAFKA_HOSTS
          value: posthog-redpanda:9092
        - name: CAPTURE_V1_SINK_MSK_KAFKA_TOPIC_MAIN
          value: events_plugin_ingestion
        - name: CAPTURE_V1_SINK_MSK_KAFKA_TOPIC_HISTORICAL
          value: events_plugin_ingestion_historical
        - name: CAPTURE_V1_SINK_MSK_KAFKA_TOPIC_OVERFLOW
          value: events_plugin_ingestion_overflow
        - name: CAPTURE_V1_SINK_MSK_KAFKA_TOPIC_DLQ
          value: events_plugin_ingestion_dlq
        - name: CAPTURE_V1_SINK_MSK_KAFKA_TOPIC_EXCEPTION
          value: ingestion-errortracking-main
        - name: CAPTURE_V1_SINK_MSK_KAFKA_TOPIC_HEATMAP
          value: heatmaps_ingestion
        - name: CAPTURE_V1_SINK_MSK_KAFKA_TOPIC_CLIENT_INGESTION_WARNING
          value: ingestion-clientwarnings-main-1
        - name: RUST_LOG
          value: info,rdkafka=warn
        envFrom:
        - configMapRef:
            name: posthog-app-config
        image: ghcr.io/posthog/posthog/capture:master
        name: capture
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 256Mi
---
