          periodSeconds: 20
          timeoutSeconds: 5
        name: web
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8001
          name: metrics
        readinessProbe:
          failureThreshold: 30
          httpGet:
            path: /_health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
