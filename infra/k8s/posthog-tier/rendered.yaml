apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: posthog-temporal
    app.kubernetes.io/part-of: posthog
  name: posthog-temporal
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-temporal
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-temporal
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
      - env:
        - name: DB
          value: postgres12
        - name: DBNAME
          value: temporal
        - name: VISIBILITY_DBNAME
          value: temporal_visibility
        - name: DB_PORT
          value: "5432"
        - name: POSTGRES_SEEDS
          value: posthog-postgres-cnpg-rw
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: posthog-app-secrets
        - name: POSTGRES_PWD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PWD
              name: posthog-app-secrets
        - name: DYNAMIC_CONFIG_FILE_PATH
          value: config/dynamicconfig/development-sql.yaml
        - name: ENABLE_ES
          value: "false"
        - name: BIND_ON_IP
          value: 0.0.0.0
        - name: TEMPORAL_BROADCAST_ADDRESS
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: TEMPORAL_ADDRESS
          value: 127.0.0.1:7233
        image: docker.io/temporalio/auto-setup:1.26.2
        name: temporal
        ports:
        - containerPort: 7233
          name: grpc
        readinessProbe:
          failureThreshold: 30
          initialDelaySeconds: 60
          periodSeconds: 10
          tcpSocket:
            port: grpc
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 512Mi
        volumeMounts:
        - mountPath: /etc/temporal/config/dynamicconfig/development-sql.yaml
          name: dynamicconfig
          subPath: development-sql.yaml
      volumes:
      - configMap:
          name: posthog-temporal-dynamicconfig
        name: dynamicconfig
---
