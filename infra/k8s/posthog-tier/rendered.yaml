apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/name: posthog-clickhouse
    app.kubernetes.io/part-of: posthog
  name: posthog-clickhouse
  namespace: posthog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-clickhouse
  serviceName: posthog-clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-clickhouse
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
      - env:
        - name: CLICKHOUSE_SKIP_USER_SETUP
          value: "1"
        - name: KAFKA_HOSTS
          value: posthog-redpanda:9092
        image: docker.io/clickhouse/clickhouse-server:26.3.10.60
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/bash
              - -ec
              - |
                for _ in $(seq 1 120); do
                  clickhouse-client --query "CREATE TABLE IF NOT EXISTS system.crash_log (event_date Date, event_time DateTime, hostname String) ENGINE = MergeTree ORDER BY event_time" && exit 0
                  sleep 1
                done
                exit 1
        livenessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
        name: clickhouse
        ports:
        - containerPort: 8123
          name: http
        - containerPort: 9000
          name: native
        readinessProbe:
          failureThreshold: 30
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: "4"
            memory: 8Gi
          requests:
            cpu: "1"
            memory: 4Gi
        volumeMounts:
        - mountPath: /var/lib/clickhouse
          name: data
        - mountPath: /etc/clickhouse-server/config.d/posthog.xml
          name: config
          subPath: posthog.xml
        - mountPath: /etc/clickhouse-server/users.d/users-posthog.xml
          name: config
          subPath: users-posthog.xml
      volumes:
      - configMap:
          name: posthog-clickhouse-config
        name: config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      storageClassName: local-path
