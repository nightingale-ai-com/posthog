apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/part-of: posthog
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: restricted
  name: posthog
---
apiVersion: v1
data:
  ANTHROPIC_API_KEY: ""
  BROWSERLESS_CDP_URL: ws://posthog-browserless:3000
  CDP_API_URL: http://posthog-plugins:6738
  CDP_REDIS_HOST: posthog-redis
  CDP_REDIS_PORT: "6379"
  CLICKHOUSE_CLUSTER: posthog
  CLICKHOUSE_DATABASE: posthog
  CLICKHOUSE_HOST: posthog-clickhouse
  CLICKHOUSE_MIGRATIONS_HOST: posthog-clickhouse
  CLICKHOUSE_SECURE: "false"
  CLICKHOUSE_VERIFY: "false"
  CLICKHOUSE_WRITABLE_CLUSTER: posthog_writable
  COOKIELESS_REDIS_HOST: posthog-redis
  COOKIELESS_REDIS_PORT: "6379"
  DEPLOYMENT: hobby
  FLAGS_REDIS_ENABLED: "false"
  HEATMAP_BROWSERLESS_BLOCK_CONSENT_MODALS: "false"
  HEATMAP_BROWSERLESS_URL: http://posthog-browserless:3000
  ISSUE_BUCKETS_REDIS_URL: redis://posthog-redis:6379/
  KAFKA_HOSTS: posthog-redpanda:9092
  LIVESTREAM_HOST: https://posthog.nightingale-ai.com/livestream
  LOGS_REDIS_HOST: posthog-redis
  LOGS_REDIS_PASSWORD: ""
  LOGS_REDIS_PORT: "6379"
  LOGS_REDIS_TLS: "false"
  OBJECT_STORAGE_BUCKET: posthog
  OBJECT_STORAGE_ENABLED: "true"
  OBJECT_STORAGE_ENDPOINT: http://posthog-seaweedfs:8333
  OBJECT_STORAGE_PUBLIC_ENDPOINT: https://posthog.nightingale-ai.com
  OBJECT_STORAGE_REGION: us-east-1
  OPENAI_API_KEY: ""
  OPT_OUT_CAPTURE: "false"
  OTEL_SDK_DISABLED: "true"
  PERSONHOG_ADDR: posthog-personhog-router:50052
  PERSONHOG_ENABLED: "true"
  PERSONHOG_ROLLOUT_PERCENTAGE: "100"
  POSTHOG_SKIP_MIGRATION_CHECKS: "1"
  RECORDING_API_URL: http://posthog-recording-api:6738
  REDIS_URL: redis://posthog-redis:6379/
  SESSION_RECORDING_API_REDIS_HOST: posthog-redis
  SESSION_RECORDING_API_REDIS_PORT: "6379"
  SESSION_RECORDING_V2_S3_BUCKET: posthog
  SESSION_RECORDING_V2_S3_ENDPOINT: http://posthog-seaweedfs:8333
  SESSION_RECORDING_V2_S3_REGION: us-east-1
  SITE_URL: https://posthog.nightingale-ai.com
  SKIP_ASYNC_MIGRATIONS_SETUP: "1"
  TEMPORAL_HOST: posthog-temporal
  TEMPORAL_NAMESPACE: default
  TEMPORAL_PORT: "7233"
  TRACES_REDIS_HOST: posthog-redis
  TRACES_REDIS_PASSWORD: ""
  TRACES_REDIS_PORT: "6379"
  TRACES_REDIS_TLS: "false"
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/part-of: posthog
  name: posthog-app-config
  namespace: posthog
---
apiVersion: v1
data:
  posthog.xml: |
    <clickhouse>
        <tcp_port>9000</tcp_port>
        <remote_servers>
            <posthog>
                <shard>
                    <replica>
                        <host>posthog-clickhouse-0.posthog-clickhouse.posthog.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </posthog>
            <posthog_single_shard>
                <shard>
                    <replica>
                        <host>posthog-clickhouse-0.posthog-clickhouse.posthog.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </posthog_single_shard>
            <posthog_migrations>
                <shard>
                    <replica>
                        <host>posthog-clickhouse-0.posthog-clickhouse.posthog.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </posthog_migrations>
            <posthog_writable>
                <shard>
                    <replica>
                        <host>posthog-clickhouse-0.posthog-clickhouse.posthog.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </posthog_writable>
            <posthog_primary_replica>
                <shard>
                    <replica>
                        <host>posthog-clickhouse-0.posthog-clickhouse.posthog.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </posthog_primary_replica>
            <ai_events>
                <shard>
                    <replica>
                        <host>posthog-clickhouse-0.posthog-clickhouse.posthog.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </ai_events>
            <aux>
                <shard>
                    <replica>
                        <host>posthog-clickhouse-0.posthog-clickhouse.posthog.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </aux>
            <ops>
                <shard>
                    <replica>
                        <host>posthog-clickhouse-0.posthog-clickhouse.posthog.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </ops>
            <sessions>
                <shard>
                    <replica>
                        <host>posthog-clickhouse-0.posthog-clickhouse.posthog.svc.cluster.local</host>
                        <port>9000</port>
                    </replica>
                </shard>
            </sessions>
        </remote_servers>
        <named_collections>
            <msk_cluster><kafka_broker_list from_env="KAFKA_HOSTS"/></msk_cluster>
            <warpstream_ingestion><kafka_broker_list from_env="KAFKA_HOSTS"/></warpstream_ingestion>
            <warpstream_calculated_events><kafka_broker_list from_env="KAFKA_HOSTS"/></warpstream_calculated_events>
            <warpstream_replay><kafka_broker_list from_env="KAFKA_HOSTS"/></warpstream_replay>
            <warpstream_shared><kafka_broker_list from_env="KAFKA_HOSTS"/></warpstream_shared>
            <warpstream_cyclotron><kafka_broker_list from_env="KAFKA_HOSTS"/></warpstream_cyclotron>
        </named_collections>
        <macros>
            <shard>01</shard>
            <replica>ch1</replica>
            <hostClusterType>online</hostClusterType>
            <hostClusterRole>data</hostClusterRole>
        </macros>
        <zookeeper>
            <node>
                <host>zookeeper</host>
                <port>2181</port>
            </node>
        </zookeeper>
        <crash_log>
            <database>system</database>
            <table>crash_log</table>
            <partition_by />
            <flush_interval_milliseconds>1000</flush_interval_milliseconds>
            <max_size_rows>1024</max_size_rows>
            <reserved_size_rows>1024</reserved_size_rows>
            <buffer_size_rows_flush_threshold>512</buffer_size_rows_flush_threshold>
            <flush_on_crash>true</flush_on_crash>
        </crash_log>
    </clickhouse>
  users-posthog.xml: |
    <clickhouse>
        <profiles>
            <default>
                <max_memory_usage>10000000000</max_memory_usage>
                <compatibility>26.3</compatibility>
                <enable_materialized_cte>1</enable_materialized_cte>
                <async_insert>0</async_insert>
                <optimize_empty_string_comparisons>0</optimize_empty_string_comparisons>
                <distributed_product_mode>global</distributed_product_mode>
                <enable_parallel_replicas>0</enable_parallel_replicas>
                <max_parallel_replicas>1</max_parallel_replicas>
                <allow_experimental_window_functions>1</allow_experimental_window_functions>
                <allow_suspicious_low_cardinality_types>1</allow_suspicious_low_cardinality_types>
                <insert_distributed_sync>1</insert_distributed_sync>
                <throw_on_max_partitions_per_insert_block>false</throw_on_max_partitions_per_insert_block>
                <number_of_mutations_to_throw>1</number_of_mutations_to_throw>
            </default>
        </profiles>
        <users>
            <default>
                <password></password>
                <networks>
                    <ip>::/0</ip>
                </networks>
                <profile>default</profile>
                <quota>default</quota>
                <access_management>1</access_management>
                <named_collection_control>1</named_collection_control>
                <show_named_collections>1</show_named_collections>
                <show_named_collections_secrets>1</show_named_collections_secrets>
            </default>
        </users>
    </clickhouse>
