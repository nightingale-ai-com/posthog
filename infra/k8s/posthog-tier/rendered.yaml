apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: posthog-kafka-init
    app.kubernetes.io/part-of: posthog
  name: posthog-kafka-init
  namespace: posthog
spec:
  backoffLimit: 6
  manualSelector: true
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog-kafka-init
      app.kubernetes.io/part-of: posthog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog-kafka-init
        app.kubernetes.io/part-of: posthog
    spec:
      containers:
      - command:
        - /bin/sh
        - -ec
        - |
          until rpk topic list --brokers posthog-redpanda:9092 >/dev/null 2>&1; do
            echo "waiting for Redpanda"
            sleep 2
          done
          TOPICS="clickhouse_events_json clickhouse_ai_events_json clickhouse_heatmap_events clickhouse_ingestion_warnings events_plugin_ingestion events_plugin_ingestion_historical events_plugin_ingestion_overflow events_plugin_ingestion_dlq events_plugin_ingestion_async ingestion-clientwarnings-main-1 ingestion-errortracking-main heatmaps_ingestion session_recording_snapshot_item_events logs_ingestion metrics_ingestion traces_ingestion clickhouse_groups clickhouse_person clickhouse_person_distinct_id clickhouse_app_metrics2 log_entries clickhouse_tophog"
          for topic in $TOPICS; do
            rpk topic create "$topic" --brokers posthog-redpanda:9092 -p 1 -r 1 || true
          done
          rpk topic list --brokers posthog-redpanda:9092
        image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
        name: kafka-init
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
      restartPolicy: OnFailure
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/part-of: posthog
  name: posthog-app-secrets
  namespace: posthog
spec:
  data:
  - remoteRef:
      key: posthog/postgres
      property: username
    secretKey: pg_user
  - remoteRef:
      key: posthog/postgres
      property: password
    secretKey: pg_password
  - remoteRef:
      key: posthog/app
      property: secret_key
    secretKey: secret_key
  - remoteRef:
      key: posthog/app
      property: encryption_salt_keys
    secretKey: encryption_salt_keys
  - remoteRef:
      key: posthog/app
      property: browserless_token
    secretKey: browserless_token
  - remoteRef:
      key: posthog/objectstorage
      property: root_user
    secretKey: objectstorage_user
  - remoteRef:
      key: posthog/objectstorage
      property: root_password
    secretKey: objectstorage_password
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-backend
  target:
    creationPolicy: Owner
    name: posthog-app-secrets
    template:
      data:
        BEHAVIORAL_COHORTS_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password
          }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/behavioral_cohorts
        BROWSERLESS_TOKEN: '{{ .browserless_token }}'
        CYCLOTRON_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/cyclotron
        CYCLOTRON_NODE_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/cyclotron_node
        DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/posthog
        ENCRYPTION_SALT_KEYS: '{{ .encryption_salt_keys }}'
        FLAGS_READ_STORE_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/flags_read_store
        HEATMAP_BROWSERLESS_TOKEN: '{{ .browserless_token }}'
        LIVESTREAM_JWT_SECRET: '{{ .secret_key }}'
        OBJECT_STORAGE_ACCESS_KEY_ID: '{{ .objectstorage_user }}'
        OBJECT_STORAGE_SECRET_ACCESS_KEY: '{{ .objectstorage_password }}'
        PERSONS_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/posthog_persons
        PERSONS_READ_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/posthog_persons
        PERSONS_READONLY_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/posthog_persons
        PERSONS_WRITE_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/posthog_persons
        POSTGRES_PWD: '{{ .pg_password }}'
        POSTGRES_USER: '{{ .pg_user }}'
        PRIMARY_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/posthog_persons
        READ_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/posthog
        SECRET_KEY: '{{ .secret_key }}'
        SESSION_RECORDING_V2_S3_ACCESS_KEY_ID: '{{ .objectstorage_user }}'
        SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY: '{{ .objectstorage_password }}'
        WRITE_DATABASE_URL: postgres://{{ .pg_user }}:{{ .pg_password }}@posthog-postgres-cnpg-rw.posthog.svc.cluster.local:5432/posthog
      mergePolicy: Replace
